<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Availability — Veranda Hotels & Resorts</title>
  <meta name="description" content="Select your check-in and check-out dates to find available luxury rooms across Veranda properties in India.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css">
  <style>
    /* ─── Search Page Layout ─── */
    .search-page-main {
      min-height: calc(100vh - 80px); /* Account for header/footer */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl) var(--space-lg);
      background: linear-gradient(135deg, #1C1008 0%, #3D2010 100%);
      position: relative;
    }

    .search-form-container {
      background: var(--clr-white);
      padding: var(--space-xl);
      border-radius: var(--radius-md);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 800px;
      position: relative;
      z-index: 2;
    }

    .search-header {
      text-align: center;
      margin-bottom: var(--space-xl);
    }

    .search-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 4vw, 2.5rem);
      font-weight: 600;
      color: var(--clr-body);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    .search-subtitle {
      font-family: var(--font-script);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--clr-accent);
      letter-spacing: 0.05em;
    }

    /* ─── Search Form Fields ─── */
    .search-form {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      align-items: end;
    }

    @media (max-width: 768px) {
      .search-form {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
    }

    .search-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .search-label {
      font-family: var(--font-heading);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--clr-body);
    }

    .search-input {
      font-family: var(--font-body);
      font-size: 1rem;
      padding: 12px 16px;
      border: 1px solid #d5d5d5;
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color var(--trans-fast);
      color: var(--clr-body);
      background: #fafafa;
    }

    .search-input:focus {
      border-color: var(--clr-accent);
    }

    .search-submit-btn {
      grid-column: 1 / -1;
      margin-top: 1rem;
      background: var(--clr-button);
      color: var(--clr-white);
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      padding: 16px 24px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--trans-fast), transform var(--trans-fast);
    }

    .search-submit-btn:hover {
      background: #3D2010;
      transform: translateY(-2px);
    }

    /* Subtle background pattern */
    .bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      background-image: radial-gradient(circle at 2px 2px, white 1px, transparent 0);
      background-size: 40px 40px;
      z-index: 1;
    }
  </style>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%235C3320'/><text x='50' y='70' font-family='serif' font-size='60' font-style='italic' fill='%23C9A84C' text-anchor='middle'>V</text></svg>">
</head>
<body>
  <!-- Header Wrapper -->
  <div id="header-wrapper"></div>

  <!-- Main Search Area -->
  <main class="search-page-main">
    <div class="bg-pattern"></div>
    <div class="search-form-container reveal">
      <div class="search-header">
        <h1 class="search-title">Plan Your Stay</h1>
        <p class="search-subtitle">Discover unmatched luxury across India</p>
      </div>

      <form action="booking.html" method="GET" class="search-form">
        <div class="search-field">
          <label for="checkin" class="search-label">Check-in</label>
          <input type="date" id="checkin" name="checkin" class="search-input" required>
        </div>

        <div class="search-field">
          <label for="checkout" class="search-label">Check-out</label>
          <input type="date" id="checkout" name="checkout" class="search-input" required>
        </div>

        <div class="search-field">
          <label for="guests" class="search-label">Guests</label>
          <select id="guests" name="guests" class="search-input" required>
            <option value="1">1 Person</option>
            <option value="2" selected>2 Persons</option>
            <option value="3">3 Persons</option>
            <option value="4">4 Persons</option>
            <option value="5+">5+ Persons</option>
          </select>
        </div>

        <button type="submit" class="search-submit-btn">Show Availability</button>
      </form>
    </div>
  </main>

  <!-- Footer Wrapper -->
  <div id="footer-wrapper"></div>

  <!-- Core Scripts -->
  <script src="js/components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Initialize common components (header, footer, nav drawer, scroll reveal)
      if (typeof renderComponents === 'function') {
        renderComponents('search'); // Highlight "search" if it was a nav item
      }

      // Pre-fill dates for better UX
      const today = new Date();
      const tmrw = new Date(today);
      tmrw.setDate(tmrw.getDate() + 1);

      const inEl = document.getElementById('checkin');
      const outEl = document.getElementById('checkout');

      inEl.value = today.toISOString().split('T')[0];
      outEl.value = tmrw.toISOString().split('T')[0];

      // Minimum dates
      inEl.min = today.toISOString().split('T')[0];
      
      inEl.addEventListener('change', () => {
        const selected = new Date(inEl.value);
        const nextDay = new Date(selected);
        nextDay.setDate(nextDay.getDate() + 1);
        outEl.min = nextDay.toISOString().split('T')[0];
        
        if (new Date(outEl.value) <= selected) {
          outEl.value = nextDay.toISOString().split('T')[0];
        }
      });
    });
  </script>
</body>
</html>
